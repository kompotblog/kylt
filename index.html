<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>культ</title>
    <style>
        /* Сброс и базовые настройки */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0b0c1e 0%, #1a1b2f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Анимированные фоновые частицы */
        .bg-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: rgba(196, 30, 58, 0.15);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            box-shadow: 0 0 15px #c41e3a;
            animation: floatParticle 12s infinite ease-in-out;
        }

        .bg-particle.blue {
            background: rgba(30, 58, 196, 0.15);
            box-shadow: 0 0 15px #1e3ac4;
            width: 12px;
            height: 12px;
        }

        @keyframes floatParticle {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            50% { transform: translate(40px, -30px) scale(1.4); opacity: 0.7; }
        }

        /* Основная карточка */
        .cult-card {
            position: relative;
            z-index: 10;
            max-width: 560px;
            width: 100%;
            background: rgba(15, 15, 30, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(196, 30, 58, 0.3);
            border-radius: 48px;
            padding: 36px 28px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.7), 0 0 0 2px rgba(30,58,196,0.2) inset, 0 0 30px #1e3ac480;
            transition: border-color 0.3s, box-shadow 0.5s;
            animation: cardPulse 5s infinite alternate;
        }

        .cult-card:hover {
            border-color: #c41e3a;
            box-shadow: 0 30px 60px rgba(196,30,58,0.3), 0 0 0 3px #1e3ac4 inset, 0 0 40px #1e3ac4;
        }

        @keyframes cardPulse {
            0% { border-color: rgba(196, 30, 58, 0.3); box-shadow: 0 0 0 2px rgba(30,58,196,0.2) inset; }
            100% { border-color: rgba(30, 58, 196, 0.5); box-shadow: 0 0 20px #c41e3a80, 0 0 0 3px #c41e3a inset; }
        }

        /* Шапка с двумя лентами */
        .header-duo {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .cult-title {
            display: flex;
            flex-direction: column;
        }

        .cult-name {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #f03e5a, #3e5af0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
            filter: drop-shadow(0 0 12px #c41e3a);
            animation: textShake 3s infinite;
        }

        @keyframes textShake {
            0%, 100% { transform: translateX(0); }
            2% { transform: translateX(-1.5px) rotate(-0.5deg); }
            4% { transform: translateX(1.5px) rotate(0.5deg); }
            6% { transform: translateX(-1px) rotate(-0.3deg); }
            8% { transform: translateX(0) rotate(0); }
        }

        .tg-icon {
            font-size: 3rem;
            background: radial-circle(white, #c41e3a);
            color: white;
            text-shadow: 0 0 20px #1e3ac4, 0 0 30px #c41e3a;
            animation: rotateIcon 6s infinite linear;
            display: inline-block;
        }

        @keyframes rotateIcon {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(5deg) scale(1.1); }
            75% { transform: rotate(-5deg) scale(0.95); }
            100% { transform: rotate(0deg) scale(1); }
        }

        /* Описание и статистика */
        .description {
            color: #e0e0f0;
            font-size: 1.2rem;
            line-height: 1.5;
            margin: 25px 0 20px;
            padding: 10px 0;
            border-top: 2px dashed #c41e3a80;
            border-bottom: 2px dashed #1e3ac480;
            text-shadow: 0 0 5px black;
            word-break: break-word;
        }

        .description span {
            font-weight: bold;
            background: linear-gradient(145deg, #c41e3a, #1e3ac4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 30px 0;
        }

        .meta-item {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 30px;
            padding: 18px 12px;
            text-align: center;
            border: 1px solid #c41e3a;
            box-shadow: 0 0 15px #1e3ac4 inset, 0 5px 10px rgba(0,0,0,0.6);
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }

        .meta-item:nth-child(2) {
            border: 1px solid #1e3ac4;
            box-shadow: 0 0 15px #c41e3a inset, 0 5px 10px black;
        }

        .meta-item:hover {
            transform: scale(1.05) translateY(-5px);
            border-color: white;
        }

        .meta-label {
            font-size: 1rem;
            text-transform: uppercase;
            color: #aaaaff;
            letter-spacing: 2px;
        }

        .meta-value {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(45deg, #ff6b7b, #4e6bff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.3;
        }

        .meta-value.small {
            font-size: 1.4rem;
            -webkit-text-fill-color: #f0f0ff;
            background: none;
            color: #f0f0ff;
        }

        /* Кнопка-приглашение */
        .invite-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 30px;
        }

        .invite-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(95deg, #c41e3a, #1e3ac4, #c41e3a);
            background-size: 200% auto;
            color: white;
            font-weight: 700;
            font-size: 1.3rem;
            padding: 18px 30px;
            border-radius: 80px;
            text-decoration: none;
            letter-spacing: 1.5px;
            border: 2px solid rgba(255,255,255,0.3);
            width: 100%;
            justify-content: center;
            transition: 0.4s;
            box-shadow: 0 0 25px #c41e3a, 0 0 15px #1e3ac4;
            animation: gradientMove 5s ease infinite, linkGlow 2s infinite alternate;
            word-break: break-word;
            text-align: center;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes linkGlow {
            0% { box-shadow: 0 0 15px #c41e3a, 0 0 25px #1e3ac4; }
            100% { box-shadow: 0 0 30px #1e3ac4, 0 0 40px #c41e3a; }
        }

        .invite-link:hover {
            transform: scale(1.02);
            border-color: white;
            box-shadow: 0 0 45px #c41e3a, 0 0 60px #1e3ac4;
        }

        .invite-link:active {
            transform: scale(0.98);
        }

        /* Доп. текст про дружелюбие */
        .vibe {
            margin-top: 24px;
            font-size: 1.25rem;
            color: #bcbcff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .vibe span {
            display: inline-block;
            animation: bounce 1.8s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .vibe .red-dot {
            width: 16px;
            height: 16px;
            background: #c41e3a;
            border-radius: 50%;
            box-shadow: 0 0 20px red;
            animation: pulseDot 1.5s infinite;
        }

        .vibe .blue-dot {
            width: 16px;
            height: 16px;
            background: #1e3ac4;
            border-radius: 50%;
            box-shadow: 0 0 20px blue;
            animation: pulseDot 1.5s infinite reverse;
        }

        @keyframes pulseDot {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* Адаптация под телефоны */
        @media (max-width: 480px) {
            .cult-card {
                padding: 25px 18px;
                border-radius: 32px;
            }
            .cult-name {
                font-size: 1.8rem;
            }
            .tg-icon {
                font-size: 2.5rem;
            }
            .meta-grid {
                gap: 10px;
            }
            .meta-item {
                padding: 12px 5px;
            }
            .meta-value {
                font-size: 1.6rem;
            }
            .meta-value.small {
                font-size: 1.2rem;
            }
            .invite-link {
                font-size: 1.1rem;
                padding: 15px 10px;
            }
            .description {
                font-size: 1rem;
            }
        }

        /* Для очень маленьких экранов */
        @media (max-width: 360px) {
            .meta-label {
                font-size: 0.75rem;
            }
            .meta-value {
                font-size: 1.3rem;
            }
        }

        /* ссылка переносится */
        @media (max-width: 420px) {
            .invite-link {
                word-break: break-all;
            }
        }

        /* полоски */
        .red-stripe {
            width: 80px;
            height: 6px;
            background: #c41e3a;
            border-radius: 6px;
            box-shadow: 0 0 20px red;
            margin: 10px 0;
        }

        .blue-stripe {
            width: 80px;
            height: 6px;
            background: #1e3ac4;
            border-radius: 6px;
            box-shadow: 0 0 20px blue;
            margin: 10px 0 10px auto;
        }
    </style>
</head>
<body>
    <!-- Фоновые анимированные точки (красные и синие) -->
    <div class="bg-particle" style="top: 10%; left: 5%;"></div>
    <div class="bg-particle blue" style="top: 70%; left: 85%; animation-duration: 18s;"></div>
    <div class="bg-particle" style="top: 80%; left: 20%; animation-duration: 20s; width: 15px; height: 15px;"></div>
    <div class="bg-particle blue" style="top: 15%; left: 75%; animation-duration: 14s;"></div>
    <div class="bg-particle" style="top: 40%; left: 45%;"></div>
    <div class="bg-particle blue" style="top: 88%; left: 40%; width: 20px; height: 20px;"></div>

    <main class="cult-card">
        <!-- Шапка с именем и иконкой -->
        <div class="header-duo">
            <div class="cult-title">
                <div class="red-stripe"></div>
                <h1 class="cult-name">РОМАН<br>КОМПОТ</h1>
                <div class="blue-stripe"></div>
            </div>
            <div class="tg-icon">🍑</div>
        </div>

        <!-- Краткое описание "культ" (фраза про треш убрана) -->
        <div class="description">
            <span>○ культ романа компота ○</span><br>
            обычный чат, но священный. участников не так уж и много, бывает <span>треш</span>, 
            но мы очень дружелюбные 🍒
        </div>

        <!-- Дата создания и метрики участников -->
        <div class="meta-grid">
            <div class="meta-item">
                <div class="meta-label">📅 дата создания</div>
                <div class="meta-value">14 МАРТА</div>
                <div class="meta-value" style="font-size:1.6rem;">2026</div>
            </div>
            <div class="meta-item">
                <div class="meta-label">👥 адептов</div>
                <div class="meta-value small">не так уж много</div>
                <!-- удалена строка "но хватит для треша" -->
            </div>
        </div>

        <!-- Блок с приглашением и акцентом дружелюбия -->
        <div class="invite-section">
            <a href="https://t.me/+TCd5JXZXNmswNzBi" class="invite-link" target="_blank" rel="noopener noreferrer">
                ✦ ВСТУПИТЬ В КУЛЬТ ✦
            </a>
            <div class="vibe">
                <span class="red-dot"></span>
                <span style="display: flex; gap:5px;">🍷⚡💬🤝</span>
                <span class="blue-dot"></span>
            </div>
            <div style="font-size: 1.2rem; margin-top: 10px; color: #c0c0ff; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
                <span style="background: #c41e3a20; padding: 6px 14px; border-radius: 40px;">#компот</span>
                <span style="background: #1e3ac420; padding: 6px 14px; border-radius: 40px;">#роман</span>
                <span style="background: #c41e3a20; padding: 6px 14px; border-radius: 40px;">#дружба</span>
            </div>
        </div>

        <!-- Дополнительная информация: ссылка текстом -->
        <div style="margin-top: 22px; text-align: center; font-size: 0.8rem; background: rgba(0,0,0,0.6); padding: 8px; border-radius: 50px; border: 1px dashed #c41e3a;">
            <span style="color:#9f9fff;">🔗 t.me/+TCd5JXZXNmswNzBi</span>
        </div>

        <!-- Элементы с цветами -->
        <div style="display: flex; justify-content: space-between; margin-top: 15px;">
            <span style="width: 20px; height: 20px; border-radius: 50%; background: #c41e3a; filter: blur(4px);"></span>
            <span style="width: 30px; height: 30px; border-radius: 50%; background: #1e3ac4; filter: blur(6px);"></span>
            <span style="width: 20px; height: 20px; border-radius: 50%; background: #c41e3a; filter: blur(4px);"></span>
        </div>
    </main>
</body>
</html>
